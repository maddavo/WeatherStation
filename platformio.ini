[platformio]
default_envs = nodemcuv2_ota

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
upload_port = COM3
monitor_port = COM3
upload_speed = 115200
monitor_speed = 115200

lib_deps =
  mathworks/ThingSpeak
  thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays
  adafruit/Adafruit SHT31 Library
  adafruit/Adafruit BMP085 Library
  claws/BH1750
  bblanchon/ArduinoJson
  knolleary/PubSubClient

[env:nodemcuv2_ota]
platform = espressif8266
board = nodemcuv2
framework = arduino
upload_protocol = espota
upload_port = 192.168.0.102
upload_flags =
  --auth=toomuchweather
monitor_speed = 115200

lib_deps =
  mathworks/ThingSpeak
  thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays
  adafruit/Adafruit SHT31 Library
  adafruit/Adafruit BMP085 Library
  claws/BH1750
  bblanchon/ArduinoJson
  knolleary/PubSubClient